<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaFlow AI — Test Drive | Jason Adams</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0b1120;color:#e2e8f0;font-family:'Inter',sans-serif}
button{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#111827}
::-webkit-scrollbar-thumb{background:#1e2d45;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  bg:"#0b1120",bg2:"#111827",bg3:"#1a2235",
  blue:"#3b7ef8",blueL:"#5b9cf6",
  gold:"#f59e0b",goldL:"#fbbf24",
  green:"#10b981",red:"#ef4444",
  text:"#e2e8f0",muted:"#94a3b8",border:"#1e2d45",
};

const LEADS = [
  {id:1,firstName:"Sarah",lastName:"Chen",email:"sarah@growthloop.io",title:"VP of Sales",company:"GrowthLoop",website:"growthloop.io",industry:"SaaS / Software",size:"50–199 employees",budget:"$500–$2,000/month",authority:"I need sign-off from one other person",need:"Our reps have no visibility into deal risk until it's too late.",timeline:"Next quarter (30–90 days)",attribution:"LinkedIn"},
  {id:2,firstName:"David",lastName:"Mensah",email:"david@growthstack.io",title:"CRO",company:"GrowthStack",website:"growthstack.io",industry:"SaaS / Software",size:"200–500 employees",budget:"$2,000+/month",authority:"I'm the sole decision maker",need:"We need better forecasting and deal risk visibility.",timeline:"Immediately (within 30 days)",attribution:"Referred by a colleague"},
  {id:3,firstName:"Amara",lastName:"Osei",email:"amara@pipelineiq.io",title:"VP of Sales",company:"PipelineIQ",website:"pipelineiq.io",industry:"SaaS / Software",size:"200–500 employees",budget:"$2,000+/month",authority:"I'm the sole decision maker",need:"We need real-time deal risk alerts for our sales team.",timeline:"Immediately (within 30 days)",attribution:"LinkedIn"},
  {id:4,firstName:"James",lastName:"Carter",email:"james@scaleops.io",title:"VP of Sales",company:"ScaleOps",website:"scaleops.io",industry:"SaaS / Software",size:"50–199 employees",budget:"$500–$2,000/month",authority:"I'm the sole decision maker",need:"We lose deals because reps follow up too late.",timeline:"Immediately (within 30 days)",attribution:"Google Search"},
];

const STAGES = ["New Inbound Lead","Priority Follow-up","Contacted","Qualified (BANT)","SQL"];

function scoreLead(l){
  let ind=0,sz=0,ttl=0;
  if(l.industry.includes("SaaS")||l.industry.includes("FinTech"))ind=20;
  else if(l.industry.includes("eCommerce")||l.industry.includes("Healthcare"))ind=10;
  if(l.size.includes("200")||l.size.includes("500"))sz=30;
  else if(l.size.includes("50"))sz=20;
  else if(l.size.includes("10"))sz=10;
  const t=l.title.toLowerCase();
  if(t.includes("vp")||t.includes("ceo")||t.includes("cro")||t.includes("founder"))ttl=30;
  else if(t.includes("director")||t.includes("head")||t.includes("revenue"))ttl=20;
  else if(t.includes("manager"))ttl=10;
  const total=ind+sz+ttl;
  return{ind,sz,ttl,total,grade:total>=60?"A":total>=35?"B":"C"};
}

const gc=g=>g==="A"?C.green:g==="B"?C.gold:C.muted;
const gl=g=>g==="A"?"Tier A":g==="B"?"Tier B":"Tier C";
const delay=ms=>new Promise(r=>setTimeout(r,ms));

function ScoreBar({label,value,max,color}){
  const[w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW((value/max)*100),100);return()=>clearTimeout(t);},[value,max]);
  return(
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
        <span style={{color:C.muted}}>{label}</span>
        <span style={{color,fontWeight:700}}>+{value}pts</span>
      </div>
      <div style={{height:6,background:C.bg3,borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${w}%`,background:color,borderRadius:3,transition:"width 0.8s ease"}}/>
      </div>
    </div>
  );
}

function StepDot({label,active,done}){
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <div style={{width:28,height:28,borderRadius:"50%",background:done?C.green:active?C.blue:C.bg3,border:`2px solid ${done?C.green:active?C.blue:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:done||active?"white":C.muted,transition:"all 0.3s"}}>
        {done?"✓":""}
      </div>
      <span style={{fontSize:9,color:active?C.blueL:C.muted,textAlign:"center",maxWidth:60,fontWeight:active?600:400}}>{label}</span>
    </div>
  );
}

function SlackMsg({lead,score,type}){
  const isRep=type==="rep";
  return(
    <div style={{background:"#1a1d21",border:"1px solid #333",borderRadius:8,padding:"14px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <div style={{width:28,height:28,borderRadius:6,background:isRep?C.blue:C.red,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>
          {isRep?"⚡":"🚨"}
        </div>
        <div>
          <span style={{color:"white",fontWeight:700,fontSize:13}}>{isRep?"Zapier":"SLA Monitor"}</span>
          <span style={{color:"#666",marginLeft:8,fontSize:11}}>APP · just now</span>
        </div>
      </div>
      {isRep?(
        <div style={{color:"#ddd",lineHeight:1.8,fontSize:13}}>
          <div style={{marginBottom:6}}>🎯 <strong>New Inbound Lead — Grade <span style={{color:gc(score.grade)}}>{score.grade}</span></strong></div>
          <div>Name: {lead.firstName} {lead.lastName}</div>
          <div>Company: {lead.company}</div>
          <div>Title: {lead.title}</div>
          <div>Score: <strong style={{color:C.gold}}>{score.total}/80</strong></div>
          <div>LinkedIn: Not found (fictional domain)</div>
          <div style={{marginTop:8}}>📌 <span style={{color:C.blueL}}>https://app.pipedrive.com/deal/★★★</span></div>
          <div>⏱ SLA: Call within 60 seconds (Tier A)</div>
        </div>
      ):(
        <div style={{color:"#ddd",lineHeight:1.8,fontSize:13}}>
          <div style={{marginBottom:6}}>🚨 <strong style={{color:C.red}}>SLA BREACH — Tier A Lead Uncontacted</strong></div>
          <div>Deal: {lead.company} — Inbound Lead</div>
          <div>Score: <strong style={{color:C.gold}}>{score.total}/80</strong></div>
          <div style={{marginTop:6}}>Rep has NOT responded within 15 minutes.</div>
          <div>⚠️ Immediate follow-up required.</div>
          <div style={{marginTop:8}}>📌 <span style={{color:C.blueL}}>https://app.pipedrive.com/deal/★★★</span></div>
        </div>
      )}
    </div>
  );
}

function PipelineBoard({deals}){
  return(
    <div style={{overflowX:"auto",paddingBottom:8}}>
      <div style={{display:"flex",gap:12,minWidth:700}}>
        {STAGES.map(stage=>{
          const sd=deals.filter(d=>d.stage===stage);
          return(
            <div key={stage} style={{flex:1,minWidth:120}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>
                {stage}<span style={{marginLeft:6,color:C.blue}}>{sd.length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {sd.map(d=>(
                  <div key={d.id} style={{background:C.bg3,border:`1px solid ${C.border}`,borderLeft:`3px solid ${gc(d.grade)}`,borderRadius:8,padding:"10px 12px"}}>
                    <div style={{fontSize:12,fontWeight:600,color:C.text,marginBottom:2}}>{d.company}</div>
                    <div style={{fontSize:11,color:C.muted,marginBottom:6}}>{d.name}</div>
                    <div style={{display:"inline-block",background:`${gc(d.grade)}22`,color:gc(d.grade),fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:100}}>
                      Grade {d.grade} · {d.score}pts
                    </div>
                  </div>
                ))}
                {sd.length===0&&(
                  <div style={{border:`1px dashed ${C.border}`,borderRadius:8,padding:"16px 12px",textAlign:"center",fontSize:11,color:C.border}}>Empty</div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App(){
  const[step,setStep]=useState(0);
  const[selLead,setSelLead]=useState(0);
  const[score,setScore]=useState(null);
  const[deals,setDeals]=useState([]);
  const[showSLA,setShowSLA]=useState(false);
  const[slaSec,setSlaSec]=useState(15);
  const[breached,setBreached]=useState(false);
  const[animScore,setAnimScore]=useState(0);
  const timerRef=useRef(null);
  const lead=LEADS[selLead];

  const reset=()=>{
    setStep(0);setScore(null);setShowSLA(false);
    setSlaSec(15);setBreached(false);setAnimScore(0);
    if(timerRef.current)clearInterval(timerRef.current);
  };

  const runDemo=async()=>{
    reset();
    await delay(200);setStep(1);
    await delay(900);setStep(2);
    await delay(1200);setStep(3);
    const s=scoreLead(lead);
    let curr=0;
    const si=setInterval(()=>{curr+=2;if(curr>=s.total){curr=s.total;clearInterval(si);}setAnimScore(curr);},20);
    await delay(1600);setScore(s);setStep(4);
    await delay(1200);
    setDeals(prev=>[...prev.filter(d=>d.id!==lead.id),{id:lead.id,company:lead.company,name:`${lead.firstName} ${lead.lastName}`,stage:s.grade==="A"?"Priority Follow-up":"New Inbound Lead",grade:s.grade,score:s.total}]);
    setStep(5);
    await delay(1200);
    if(s.grade==="A"){
      setStep(6);setShowSLA(true);
      let sec=15;
      timerRef.current=setInterval(()=>{sec-=1;setSlaSec(sec);if(sec<=0){clearInterval(timerRef.current);setBreached(true);}},300);
    }
    setStep(7);
  };

  const s=scoreLead(lead);

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Inter',sans-serif",fontSize:14}}>

      {/* HEADER */}
      <div style={{background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontSize:18,fontWeight:700}}>NexaFlow AI — <span style={{color:C.blueL}}>Test Drive</span></div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>Interactive simulation · Select a lead · Run the engine</div>
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <a href="https://tally.so/r/A7ylOy" target="_blank" rel="noreferrer" style={{background:C.blue,color:"white",padding:"8px 16px",borderRadius:8,fontSize:13,fontWeight:600,textDecoration:"none"}}>
            Submit Real Form ↗
          </a>
          <a href="index.html" style={{background:"transparent",color:C.muted,padding:"8px 16px",borderRadius:8,fontSize:13,border:`1px solid ${C.border}`,textDecoration:"none"}}>
            ← Case Study
          </a>
          <button onClick={reset} style={{background:"transparent",color:C.muted,padding:"8px 16px",borderRadius:8,fontSize:13,border:`1px solid ${C.border}`,cursor:"pointer"}}>
            Reset
          </button>
        </div>
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"24px 16px"}}>

        {/* STEP PROGRESS */}
        <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 24px",marginBottom:24}}>
          <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:16}}>Pipeline Progress</div>
          <div style={{display:"flex",alignItems:"flex-start"}}>
            {["Form","Enrich","Score","Pipedrive","Slack","SLA","Done"].map((label,i)=>(
              <div key={label} style={{display:"flex",alignItems:"center",flex:i<6?1:0}}>
                <StepDot label={label} active={step===i+1} done={step>i+1}/>
                {i<6&&<div style={{flex:1,height:2,background:step>i+1?C.green:C.border,transition:"background 0.3s",marginBottom:20}}/>}
              </div>
            ))}
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:20}}>

          {/* LEFT */}
          <div style={{display:"flex",flexDirection:"column",gap:20}}>

            {/* LEAD SELECTOR */}
            <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
              <div style={{fontSize:11,color:C.gold,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700,marginBottom:14}}>
                Select a Lead
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                {LEADS.map((l,i)=>{
                  const ls=scoreLead(l);
                  return(
                    <button key={l.id} onClick={()=>{setSelLead(i);reset();}} style={{background:selLead===i?`${C.blue}22`:C.bg3,border:`1px solid ${selLead===i?C.blue:C.border}`,borderRadius:8,padding:"10px 14px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all 0.2s"}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:C.text}}>{l.firstName} {l.lastName}</div>
                        <div style={{fontSize:11,color:C.muted}}>{l.title} · {l.company}</div>
                      </div>
                      <div style={{background:`${gc(ls.grade)}22`,color:gc(ls.grade),fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:100,whiteSpace:"nowrap"}}>
                        {ls.total}pts · {gl(ls.grade)}
                      </div>
                    </button>
                  );
                })}
              </div>
              <button onClick={runDemo} style={{width:"100%",background:C.blue,color:"white",border:"none",borderRadius:8,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                ▶ Run Lead Engine
              </button>
            </div>

            {/* ENRICHMENT */}
            <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,padding:20,opacity:step>=2?1:0.4,transition:"opacity 0.5s"}}>
              <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700,marginBottom:14}}>
                Hunter.io Enrichment
              </div>
              {step>=2?(
                <div>
                  {[["Domain",lead.website],["Organization",lead.company],["LinkedIn","Not found (fictional domain)"],["Email Count","0"]].map(([k,v])=>(
                    <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
                      <span style={{color:C.muted}}>{k}</span>
                      <span style={{color:C.text,fontWeight:500}}>{v}</span>
                    </div>
                  ))}
                </div>
              ):(
                <div style={{fontSize:12,color:C.border,textAlign:"center",padding:"20px 0"}}>Waiting for form submission…</div>
              )}
            </div>

            {/* SCORING */}
            <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,padding:20,opacity:step>=3?1:0.4,transition:"opacity 0.5s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700}}>Lead Scoring</div>
                {step>=3&&<div style={{background:`${gc(s.grade)}22`,color:gc(s.grade),fontSize:14,fontWeight:800,padding:"4px 14px",borderRadius:100}}>{animScore}/80 · Grade {s.grade}</div>}
              </div>
              {step>=3?(
                <>
                  <ScoreBar label="Industry Fit" value={s.ind} max={20} color={C.blue}/>
                  <ScoreBar label="Company Size" value={s.sz} max={30} color={C.gold}/>
                  <ScoreBar label="Job Title" value={s.ttl} max={30} color={C.green}/>
                  <div style={{marginTop:12,padding:"10px 14px",background:C.bg3,borderRadius:8,fontSize:12,color:C.muted}}>
                    Industry: {s.ind}pts | Size: {s.sz}pts | Title: {s.ttl}pts
                  </div>
                </>
              ):(
                <div style={{fontSize:12,color:C.border,textAlign:"center",padding:"20px 0"}}>Waiting for enrichment…</div>
              )}
            </div>
          </div>

          {/* RIGHT */}
          <div style={{display:"flex",flexDirection:"column",gap:20}}>

            {/* FORM PREVIEW */}
            <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
              <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700,marginBottom:14}}>
                Tally Form Submission
              </div>
              {[["Name",`${lead.firstName} ${lead.lastName}`],["Email",lead.email],["Title",lead.title],["Company",lead.company],["Industry",lead.industry],["Size",lead.size],["Budget",lead.budget],["Timeline",lead.timeline]].map(([k,v])=>(
                <div key={k} style={{display:"flex",fontSize:12,padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
                  <span style={{color:C.muted,minWidth:80,flexShrink:0}}>{k}</span>
                  <span style={{color:step>=1?C.text:C.border,fontWeight:step>=1?500:400,transition:"color 0.5s"}}>{v}</span>
                </div>
              ))}
            </div>

            {/* SLACK */}
            <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,padding:20,opacity:step>=5?1:0.4,transition:"opacity 0.5s"}}>
              <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700,marginBottom:14}}>
                Slack · #inbound-leads
              </div>
              {step>=5&&score?(
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <SlackMsg lead={lead} score={score} type="rep"/>
                  {breached&&<SlackMsg lead={lead} score={score} type="sla"/>}
                </div>
              ):(
                <div style={{fontSize:12,color:C.border,textAlign:"center",padding:"20px 0"}}>No messages yet…</div>
              )}
            </div>

            {/* SLA */}
            {showSLA&&(
              <div style={{background:C.bg2,border:`1px solid ${breached?C.red:C.gold}`,borderRadius:12,padding:20,transition:"border-color 0.5s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <div style={{fontSize:11,color:breached?C.red:C.gold,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700}}>SLA Monitor</div>
                  <div style={{background:breached?`${C.red}22`:`${C.gold}22`,color:breached?C.red:C.gold,fontSize:12,fontWeight:700,padding:"3px 12px",borderRadius:100}}>
                    {breached?"BREACHED":"PENDING"}
                  </div>
                </div>
                <div style={{textAlign:"center",padding:"16px 0"}}>
                  <div style={{fontSize:44,fontWeight:800,color:breached?C.red:C.gold,fontFamily:"Georgia,serif",lineHeight:1,marginBottom:8,transition:"color 0.5s"}}>
                    {breached?"00":String(slaSec).padStart(2,"0")}
                  </div>
                  <div style={{fontSize:12,color:C.muted}}>
                    {breached?"SLA window elapsed — manager notified":"seconds remaining in 15-min SLA window"}
                  </div>
                </div>
                <div style={{fontSize:12,color:C.muted,padding:"10px 14px",background:C.bg3,borderRadius:8}}>
                  Deal: <strong style={{color:C.text}}>{lead.company} — Inbound Lead</strong><br/>
                  SLA Status: <strong style={{color:breached?C.red:C.gold}}>{breached?"Breached":"Pending"}</strong>
                </div>
              </div>
            )}
          </div>
        </div>

        {/* PIPELINE */}
        {deals.length>0&&(
          <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,padding:20,marginTop:20}}>
            <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700,marginBottom:16}}>
              Pipedrive · NexaFlow AI — Inbound Leads Pipeline
            </div>
            <PipelineBoard deals={deals}/>
          </div>
        )}

        {/* FOOTER */}
        <div style={{textAlign:"center",marginTop:32,fontSize:12,color:C.muted,padding:"20px 0",borderTop:`1px solid ${C.border}`}}>
          Built by <a href="https://linkedin.com/in/jasonadams-email" style={{color:C.blueL,textDecoration:"none"}}>Jason Adams</a>
          &nbsp;·&nbsp; CRM Automation & RevOps Specialist
          &nbsp;·&nbsp; <a href="index.html" style={{color:C.blueL,textDecoration:"none"}}>← Case Study</a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
